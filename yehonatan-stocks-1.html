// ── Safe number helper ──
const safe = (n, fallback = 0) => (typeof n === "number" && !isNaN(n) ? n : fallback);
const safeFixed = (n, d = 2, fallback = "—") => typeof n === "number" && !isNaN(n) ? n.toFixed(d) : fallback;

// ── Technical calculations ──
function calcRSI(candles, period = 14) {
  if (candles.length < period + 1) return 50;
  let gains = 0, losses = 0;
  for (let i = candles.length - period; i < candles.length; i++) {
    const diff = candles[i].c - candles[i - 1]?.c;
    if (diff > 0) gains += diff; else losses -= diff;
  }
  const rs = gains / (losses || 0.001);
  return Math.round(100 - 100 / (1 + rs));
}

function calcSMA(candles, period) {
  const slice = candles.slice(-period);
  if (!slice.length) return 0;
  return +(slice.reduce((s, c) => s + c.c, 0) / slice.length).toFixed(2);
}

function calcSupRes(candles) {
  if (!candles.length) return { floor: 0, ceiling: 0 };
  const lows = candles.map(c => c.l);
  const highs = candles.map(c => c.h);
  const minP = Math.min(...lows);
  const maxP = Math.max(...highs);
  const range = maxP - minP;
  return {
    floor: +(minP + range * 0.10).toFixed(2),
    ceiling: +(maxP - range * 0.10).toFixed(2),
  };
}

function getTrend(candles) {
  const sma20 = calcSMA(candles, 20);
  const sma50 = calcSMA(candles, 50);
  const last = candles[candles.length - 1]?.c || 0;
  if (last > sma20 && sma20 > sma50) return { label: "↑ עולה חזק", color: "#00ffaa" };
  if (last > sma20) return { label: "↑ עולה", color: "#7fff7f" };
  if (last < sma20 && sma20 < sma50) return { label: "↓ יורד חזק", color: "#ff4d6d" };
  if (last < sma20) return { label: "↓ יורד", color: "#ff8c69" };
  return { label: "→ ניטרלי", color: "#f0c040" };
}

async function tryFetch(url, timeoutMs = 6000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const res = await fetch(url, { signal: controller.signal });
    clearTimeout(timer);
    if (!res.ok) return null;
    return await res.text();
  } catch(e) { clearTimeout(timer); return null; }
}

// מקור 1: Yahoo Finance v8 ישיר (עובד בחלק מהסביבות)
async function fetchYahoo(symbol) {
  const urls = [
    `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=3mo`,
    `https://query2.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=3mo`,
  ];
  for (const url of urls) {
    const text = await tryFetch(url);
    if (!text) continue;
    try {
      const raw = JSON.parse(text);
      if (raw?.chart?.result?.[0]) return { source: "Yahoo", raw };
    } catch(e) {}
  }
  return null;
}

// מקור 2: Stooq CSV ישיר
async function fetchStooq(symbol) {
  const url = `https://stooq.com/q/d/l/?s=${symbol.toLowerCase()}.us&i=d`;
  const text = await tryFetch(url);
  if (!text || !text.includes(",") || text.includes("No data")) return null;
  try {
    const lines = text.trim().split("\n").filter(l => l && !l.startsWith("Date"));
    if (lines.length < 5) return null;
    const parseRow = l => { const p = l.split(","); return { date: p[0], o: +p[1], h: +p[2], l: +p[3], c: +p[4], v: +p[5]||1e6 }; };
    const candles = lines.map(parseRow).filter(c => c.c > 0).slice(-90);
    if (candles.length < 5) return null;
    const last = candles[candles.length - 1];
    const prev = candles[candles.length - 2];
    return { candles, lastPrice: last.c, prevClose: prev.c, date: last.date };
  } catch(e) { return null; }
}

// מקור 3: Claude API עם web search — מחיר מדויק
async function fetchViaClaudeSearch(symbol) {
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 500,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        system: "Return ONLY valid JSON, no markdown, no explanation.",
        messages: [{
          role: "user",
          content: `Search for the current stock price of ${symbol} and return ONLY this JSON:
{"price": <number>, "change": <number>, "changeP": <number>, "high52": <number>, "low52": <number>, "date": "<YYYY-MM-DD>"}
Use the most recent market data available. Return raw JSON only.`
        }]
      })
    });
    const data = await res.json();
    const text = data.content?.filter(b => b.type === "text").map(b => b.text).join("") || "";
    const match = text.match(/\{[\s\S]*\}/);
    if (!match) return null;
    const parsed = JSON.parse(match[0]);
    if (!parsed.price || isNaN(parsed.price)) return null;
    return parsed;
  } catch(e) { return null; }
}

function buildCandlesFromData(candles) {
  return candles.map(c => ({ o: c.o||c.c, h: c.h||c.c, l: c.l||c.c, c: c.c, v: c.v||1e6 }));
}

function buildSyntheticCandles(price, changeP, high52, low52) {
  const candles = [];
  const range = (high52 || price * 1.3) - (low52 || price * 0.7);
  let p = (low52 || price * 0.7) + range * 0.4;
  for (let i = 0; i < 60; i++) {
    const o = p;
    const c = Math.max(o + (Math.random() - 0.47) * price * 0.013, price * 0.6);
    const h = Math.max(o, c) + Math.random() * price * 0.005;
    const l = Math.min(o, c) - Math.random() * price * 0.005;
    candles.push({ o, h, l, c, v: Math.floor(3e6 + Math.random() * 8e6) });
    p = c;
  }
  // כוון את הנר האחרון למחיר הנוכחי
  candles[candles.length - 1].c = price;
  candles[candles.length - 1].o = price * (1 - changeP / 100);
  return candles;
}

function buildResult(symbol, price, prevClose, candles, extra = {}) {
  const change = +(price - prevClose).toFixed(2);
  const changeP = prevClose ? +((change / prevClose) * 100).toFixed(2) : 0;
  const rsi = calcRSI(candles);
  const sma20 = calcSMA(candles, 20);
  const sma50 = calcSMA(candles, 50);
  const { floor, ceiling } = calcSupRes(candles);
  const trend = getTrend(candles);
  const volArr = candles.slice(-20).map(c => c.v).filter(Boolean);
  const volAvg = volArr.reduce((s, v) => s + v, 0) / (volArr.length || 1);
  const relVol = volAvg ? (candles[candles.length-1].v / volAvg).toFixed(2) : "1.00";
  const high52 = extra.high52 || +Math.max(...candles.map(c => c.h)).toFixed(2);
  const low52  = extra.low52  || +Math.min(...candles.map(c => c.l)).toFixed(2);
  return { symbol, price, change, changeP, prevClose, candles, rsi, sma20, sma50, floor, ceiling, trend, relVol, high52, low52, ...extra };
}

function buildSyntheticCandles(price, changeP, high52, low52) {
  const candles = [];
  let p = (low52 || price * 0.75) + ((high52 || price * 1.25) - (low52 || price * 0.75)) * 0.4;
  for (let i = 0; i < 60; i++) {
    const o = p;
    const c = Math.max(o + (Math.random() - 0.47) * price * 0.013, price * 0.55);
    candles.push({ o, h: Math.max(o,c) + Math.random()*price*0.004, l: Math.min(o,c) - Math.random()*price*0.004, c, v: Math.floor(3e6 + Math.random()*8e6) });
    p = c;
  }
  candles[candles.length-1].c = price;
  candles[candles.length-1].o = prevClose => price * (1 - (changeP||0)/100);
  return candles;
}

async function fetchViaClaudeSearch(symbol) {
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {

      })
    });
    const data = await res.json();
    const text = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
    const match = text.match(/\{[^{}]+\}/);
    if (!match) return null;
    const parsed = JSON.parse(match[0]);
    return (parsed.price && !isNaN(parsed.price)) ? parsed : null;
  } catch(e) { return null; }
}

async function fetchQuote(symbol) {
  const today = new Date().toLocaleDateString("he-IL");

  // מקור 1: Yahoo ישיר
  const yahoo = await fetchYahoo(symbol);
  if (yahoo) {
    const chart = yahoo.raw.chart.result[0];
    const meta = chart.meta;
    const q = chart.indicators.quote[0];
    const candles = (chart.timestamp||[]).map((t,i) => ({
      t, o:q.open[i], h:q.high[i], l:q.low[i], c:q.close[i], v:q.volume[i]
    })).filter(c => c.o && c.c);
    if (candles.length > 5) {
      const price = +(meta.regularMarketPrice || candles[candles.length-1].c).toFixed(2);
      const prevClose = +(meta.chartPreviousClose || meta.previousClose || candles[candles.length-2]?.c || price).toFixed(2);
      return buildResult(symbol, price, prevClose, candles, {
        dataDate: today, dataSource: "Yahoo",
        high52: +(meta.fiftyTwoWeekHigh||0).toFixed(2),
        low52:  +(meta.fiftyTwoWeekLow||0).toFixed(2),
      });
    }
  }

  // מקור 2: Stooq CSV
  const stooq = await fetchStooq(symbol);
  if (stooq) {
    const candles = buildCandlesFromData(stooq.candles);
    return buildResult(symbol, +stooq.lastPrice.toFixed(2), +stooq.prevClose.toFixed(2), candles, {
      dataDate: stooq.date, dataSource: "Stooq", isFallback: true
    });
  }

  // מקור 3: Claude Web Search
  const searched = await fetchViaClaudeSearch(symbol);
  if (searched) {
    const price = +searched.price.toFixed(2);
    const prevClose = +(price - (searched.change||0)).toFixed(2);
    const candles = buildSyntheticCandles(price, searched.changeP||0, searched.high52, searched.low52);
    return buildResult(symbol, price, prevClose, candles, {
      dataDate: searched.date ? new Date(searched.date).toLocaleDateString("he-IL") : today,
      dataSource: "חיפוש",
      high52: searched.high52, low52: searched.low52,
    });
  }

  throw new Error("לא נמצאו נתונים עבור " + symbol);
}

// ── Candlestick Chart ──
function CandleChart({ candles, floor, ceiling }) {
  const display = candles.slice(-30);
  if (!display.length) return null;
  const allP = display.flatMap(c => [c.h, c.l]).filter(Boolean);
  const minP = Math.min(...allP) * 0.998;
  const maxP = Math.max(...allP) * 1.002;
  const range = maxP - minP || 1;
  const W = 340, H = 180, barW = 8, gap = 3;
  const toY = v => H - ((v - minP) / range) * H;

  const smaPath = (period, color) => {
    const pts = display.map((_, i) => {
      const slice = candles.slice(Math.max(0, candles.length - 30 + i - period + 1), candles.length - 30 + i + 1);
      if (slice.length < Math.min(period, 5)) return null;
      const avg = slice.reduce((s, c) => s + c.c, 0) / slice.length;
      return `${i * (barW + gap) + gap + barW / 2},${toY(avg)}`;
    }).filter(Boolean);
    return <polyline key={color} points={pts.join(" ")} fill="none" stroke={color} strokeWidth={1.2} opacity={0.75} />;
  };

  return (
    <svg width={W} height={H + 22} style={{ overflow: "visible", display: "block" }}>
      {/* zones */}
      {ceiling > minP && ceiling < maxP && <>
        <line x1={0} y1={toY(ceiling)} x2={W} y2={toY(ceiling)} stroke="#00ffaa" strokeWidth={1} strokeDasharray="5,3" />
        <text x={W - 2} y={toY(ceiling) - 3} fill="#00ffaa" fontSize={8} textAnchor="end">${ceiling}</text>
      </>}
      {floor > minP && floor < maxP && <>
        <line x1={0} y1={toY(floor)} x2={W} y2={toY(floor)} stroke="#ff6b35" strokeWidth={1} strokeDasharray="5,3" />
        <text x={W - 2} y={toY(floor) + 9} fill="#ff6b35" fontSize={8} textAnchor="end">${floor}</text>
      </>}
      {smaPath(20, "#4da6ff")}
      {smaPath(50, "#f0c040")}
      {display.map((c, i) => {
        const x = i * (barW + gap) + gap;
        const bull = c.c >= c.o;
        const col = bull ? "#00ffaa" : "#ff4d6d";
        const bodyTop = toY(Math.max(c.o, c.c));
        const bodyH = Math.max(1.5, Math.abs(toY(c.o) - toY(c.c)));
        return (
          <g key={i}>
            <line x1={x + barW / 2} y1={toY(c.h)} x2={x + barW / 2} y2={toY(c.l)} stroke={col} strokeWidth={1} />
            <rect x={x} y={bodyTop} width={barW} height={bodyH} fill={col} rx={1} opacity={0.9} />
          </g>
        );
      })}
      {/* legend */}
      <circle cx={6} cy={H + 14} r={3} fill="#4da6ff" />
      <text x={12} y={H + 18} fill="#4da6ff" fontSize={8}>SMA20</text>
      <circle cx={52} cy={H + 14} r={3} fill="#f0c040" />
      <text x={58} y={H + 18} fill="#f0c040" fontSize={8}>SMA50</text>
    </svg>
  );
}

// ── RSI Gauge ──
function RSIGauge({ value }) {
  const color = value > 70 ? "#ff4d6d" : value < 30 ? "#00ffaa" : "#f0c040";
  const label = value > 70 ? "קנוי יתר" : value < 30 ? "מכור יתר" : "ניטרלי";
  const r = 26, cx = 34, cy = 34, circ = 2 * Math.PI * r;
  return (
    <div style={{ textAlign: "center" }}>
      <svg width={68} height={48}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth={5} />
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={5}
          strokeDasharray={`${circ * value / 100} ${circ * (1 - value / 100)}`}
          strokeDashoffset={circ * 0.25} strokeLinecap="round" />
        <text x={cx} y={cy + 5} fill={color} fontSize={12} fontWeight={700} textAnchor="middle">{value}</text>
      </svg>
      <div style={{ color, fontSize: 9, marginTop: -6 }}>{label}</div>
    </div>
  );
}

// ── Typewriter ──
function Typewriter({ text }) {
  const [shown, setShown] = useState("");
  const ref = useRef(0);
  useEffect(() => {
    setShown(""); ref.current = 0;
    const iv = setInterval(() => {
      if (ref.current < text.length) { setShown(text.slice(0, ref.current + 1)); ref.current++; }
      else clearInterval(iv);
    }, 10);
    return () => clearInterval(iv);
  }, [text]);
  return <span style={{ whiteSpace: "pre-wrap" }}>{shown}</span>;
}

      {/* Progress bar */}
      {step > 0 && (
        <div style={{ position: "fixed", top: 0, left: "50%", transform: "translateX(-50%)", width: 390, height: 3, background: "rgba(255,255,255,0.06)", zIndex: 99 }}>

        </div>
      )}

      {steps[step]}

      {/* Bottom navigation */}
      {step > 0 && (
        <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: 390, padding: "16px 24px 32px", background: "rgba(7,11,20,0.97)", borderTop: "1px solid rgba(255,255,255,0.06)", display: "flex", gap: 12 }}>
          {step > 1 && (
            <button onClick={() => setStep(s => s - 1)}
              style={{ flex: 1, background: "rgba(255,255,255,0.06)", border: "none", borderRadius: 50, padding: "14px", fontSize: 15, color: "#fff", cursor: "pointer" }}>
              ← חזרה
            </button>
          )}
          <button onClick={() => { if (canNext()) { step === 5 ? onDone(form) : setStep(s => s + 1); } }}
            style={{ flex: 2, background: canNext() ? `linear-gradient(135deg, ${C.green}, ${C.blue})` : "rgba(255,255,255,0.08)", border: "none", borderRadius: 50, padding: "14px", fontSize: 15, fontWeight: 800, color: canNext() ? "#070b14" : "#3a5070", cursor: canNext() ? "pointer" : "default", transition: "all 0.2s" }}>
            {step === 5 ? "כניסה לאפליקציה 🚀" : "המשך"}
          </button>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════
function MainApp({ userProfile, onLogout }) {
  const [tab, setTab] = useState("home");
  const [watchlist, setWatchlist] = useState(INITIAL_SYMBOLS); // רשימת מעקב אישית
  const [stockData, setStockData] = useState({});   // { AAPL: {...}, ... }
  const [loadingSymbols, setLoadingSymbols] = useState({});
  const [selectedSymbol, setSelectedSymbol] = useState(null);
  const [aiAnalysis, setAiAnalysis] = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const [searchQuery, setSearchQuery] = useState("");
  const [searchSymbol, setSearchSymbol] = useState("");
  const [chatInput, setChatInput] = useState("");
  const [chatImage, setChatImage] = useState(null); // { base64, mediaType, preview }
  const imageInputRef = useRef(null);
  const [chatHistory, setChatHistory] = useState([
    { role: "ai", text: `שלום ${userProfile.firstName}! 🤖\n\nאני הסוכן שלך. טוען נתונים אמיתיים מ-Yahoo Finance...\n\nאני רואה: מחירים, RSI, SMA20/50, ריצפה/תיקרה, מגמה.\nשאל אותי כל דבר — לא צריך לתת לי מחירים.` }
  ]);
  const [chatLoading, setChatLoading] = useState(false);
  const [loadingStatus, setLoadingStatus] = useState(""); // שלב הטעינה הנוכחי
  const lastMsgRef = useRef(null); // ref לתחילת ההודעה האחרונה
  const chatRef = useRef(null);
  const [lastUpdated, setLastUpdated] = useState(null);
  const [feedbackOpen, setFeedbackOpen] = useState(false);
  const [feedbackText, setFeedbackText] = useState("");
  const [feedbackSent, setFeedbackSent] = useState(false);
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [virtualBudget, setVirtualBudget] = useState(0);
  const [budgetInput, setBudgetInput] = useState("");
  const [portfolio, setPortfolio] = useState([]); // { symbol, shares, avgCost }
  const [portfolioModalOpen, setPortfolioModalOpen] = useState(false);
  const [addSymbol, setAddSymbol] = useState("");
  const [addShares, setAddShares] = useState("");
  const [addPrice, setAddPrice] = useState("");
  const [editingPosition, setEditingPosition] = useState(null);

  // profile is always set here

  // Load quote for a symbol
  async function loadQuote(symbol) {
    if (loadingSymbols[symbol] || (stockData[symbol] && !stockData[symbol].error)) return;
    setLoadingSymbols(p => ({ ...p, [symbol]: true }));
    try {
      const q = await fetchQuote(symbol);
      const meta = STOCK_META[symbol] || { name: symbol, sector: "—", pe: "—", mktCap: "—" };
      setStockData(p => ({ ...p, [symbol]: { ...meta, ...q } }));
      setLastUpdated(new Date());
    } catch (e) {
      console.error("fetchQuote error", symbol, e);
      // שמור placeholder עם הודעת שגיאה
      const meta = STOCK_META[symbol] || { name: symbol, sector: "—", pe: "—", mktCap: "—" };
      setStockData(p => ({ ...p, [symbol]: { ...meta, symbol, price: null, error: true, errorMsg: "שגיאת חיבור" } }));
    }
    setLoadingSymbols(p => ({ ...p, [symbol]: false }));
  }

  // טעינת נתונים בפתיחת האפליקציה — מקביל לכולם
  useEffect(() => {
    // טעינה מקבילית של כל המניות מיד בכניסה
    Promise.all(watchlist.map(s => loadQuote(s)));
  }, []);

  // רענון כל 15 דקות — מחיק cache ומטעין מחדש
  useEffect(() => {
    const iv = setInterval(() => {
      setStockData({});
      setTimeout(() => Promise.all(watchlist.map(s => loadQuote(s))), 100);
    }, 15 * 60 * 1000);
    return () => clearInterval(iv);
  }, []);

  const selected = selectedSymbol ? stockData[selectedSymbol] : null;

  async function openStock(symbol) {
    setSelectedSymbol(symbol);
    setAiAnalysis("");
    setTab("stocks");
    if (!stockData[symbol]) await loadQuote(symbol);
    runAIAnalysis(symbol);
  }

  async function runAIAnalysis(symbol) {
    const s = stockData[symbol];
    if (!s) return;
    setAiLoading(true);
    setAiAnalysis("");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: `אתה סוכן ניתוח טכני מקצועי בעברית. תנתח מניות/ETF בצורה עמוקה וישירה. 
תמיד כלול: 
1. מצב נוכחי (1-2 משפטים)
2. ריצפה ותיקרה מרכזיות
3. נקודת כניסה מומלצת
4. סטופ לוס
5. יעד ראשון + יעד שני
6. האם עכשיו זמן טוב לכניסה ולמה
היה ספציפי במחירים. זה לא ייעוץ השקעות רשמי.`,
          messages: [{
            role: "user",
            content: `נתח: ${symbol} (${s.name})
מחיר: $${s.price} | שינוי: ${s.changeP > 0 ? "+" : ""}${s.changeP}%
RSI(14): ${s.rsi} | SMA20: $${s.sma20} | SMA50: $${s.sma50}
ריצפה: $${s.floor} | תיקרה: $${s.ceiling}
שיא 52 שבועות: $${s.high52} | שפל 52 שבועות: $${s.low52}
מגמה: ${s.trend?.label} | נפח יחסי: ${s.relVol}x
סקטור: ${s.sector} | P/E: ${s.pe}`
          }]
        })
      });
      const data = await res.json();
      setAiAnalysis(data.content?.[0]?.text || "שגיאה.");
    } catch { setAiAnalysis("שגיאה בחיבור לסוכן."); }
    setAiLoading(false);
  }

  // Re-run analysis after data loads
  useEffect(() => {
    if (selectedSymbol && stockData[selectedSymbol] && !aiAnalysis && !aiLoading) {
      runAIAnalysis(selectedSymbol);
    }
  }, [stockData, selectedSymbol]);

  async function searchAndOpen() {
    const sym = searchSymbol.trim().toUpperCase();
    if (!sym) return;
    setSearchSymbol("");
    setSearchQuery("");
    await openStock(sym);
  }

  const totalValue = portfolio.reduce((s, p) => {
    const st = stockData[p.symbol];
    return s + ((st && st.price) ? st.price * p.shares : p.avgCost * p.shares);
  }, 0);
  const totalCost = portfolio.reduce((s, p) => s + p.avgCost * p.shares, 0);
  const totalPnL = totalValue - totalCost;
  const availableCash = virtualBudget - totalCost;

  async function sendChat() {
    if (!chatInput.trim() && !chatImage) return;
    const msg = chatInput.trim() || "נתח את התמונה הזו";
    setChatInput("");
    const imgData = chatImage;
    setChatImage(null);

    // הודעת משתמש עם תמונה אם יש
    const userMsg = imgData
      ? { role: "user", text: msg, image: imgData.preview }
      : { role: "user", text: msg };
    const newHist = [...chatHistory, userMsg];
    setChatHistory(newHist);
    setChatLoading(true);

    const allData = { ...stockData };

    // ── זיהוי מניה ספציפית בשאלה ──
    const symbolPattern = /([A-Z]{2,5})/g;
    const IGNORE = ["AI","RSI","SMA","ETF","THE","AND","FOR","USD","API","CEO","IPO"];
    const foundSymbols = [...new Set([...msg.toUpperCase().matchAll(symbolPattern)]
      .map(m => m[1]).filter(s => !IGNORE.includes(s)))];

    // טען קודם את המניה שנשאלה עליה — ממוקד ומהיר
    for (const sym of foundSymbols.slice(0, 2)) {
      if (!allData[sym] || allData[sym].error) {
        setLoadingStatus(`📡 סורק ${sym}...`);
        try {
          const q = await fetchQuote(sym);
          const meta = STOCK_META[sym] || { name: sym, sector: "—", pe: "—", mktCap: "—" };
          const full = { ...meta, ...q };
          allData[sym] = full;
          setStockData(prev => ({ ...prev, [sym]: full }));
        } catch(e) { console.error(sym, e); }
      }
    }

    // השלם מניות חסרות מהwatchlist ברקע (לא חוסם)
    const missing = watchlist.filter(s => !allData[s] || allData[s].error);
    if (missing.length > 0) {
      Promise.all(missing.map(async s => {
        try {
          const q = await fetchQuote(s);
          const meta = STOCK_META[s] || { name: s, sector: "—", pe: "—", mktCap: "—" };
          setStockData(prev => ({ ...prev, [s]: { ...meta, ...q } }));
        } catch(e) {}
      }));
    }

    setLoadingStatus("🤖 מנתח...");

    // טען כל מניה שנשאלה עליה — גם אם לא ברשימת המעקב
    for (const sym of foundSymbols.slice(0, 3)) {
      if (!allData[sym] || allData[sym].error) {
        setLoadingStatus(`📡 מביא נתונים עבור ${sym}...`);
        try {
          const q = await fetchQuote(sym);
          const meta = STOCK_META[sym] || { name: sym, sector: "—", pe: "—", mktCap: "—" };
          const full = { ...meta, ...q };
          allData[sym] = full;
          setStockData(prev => ({ ...prev, [sym]: full }));
        } catch(e) { console.error(sym, e); }
      }
    }
    setLoadingStatus("🤖 מנתח...");

    // המניות שנשאלו עליהן — ראשונות ב-snapshot
    const validData = Object.values(allData).filter(s => s && s.price && !s.error && !isNaN(s.price));
    validData.sort((a, b) => (foundSymbols.includes(a.symbol) ? -1 : 1) - (foundSymbols.includes(b.symbol) ? -1 : 1));
    const hasFallback = validData.some(s => s.isFallback);
    const fallbackDates = validData.filter(s=>s.isFallback).map(s=>s.dataDate).filter(Boolean);
    const uniqueDate = fallbackDates.length > 0 ? fallbackDates[0] : "";
    const dataNote = hasFallback && uniqueDate ? `\n[חלק מהנתונים הם מיום ${uniqueDate}]` : "";
    const snapshot = validData.length > 0
      ? validData.map(s =>
          `${s.symbol} [${s.dataDate||new Date().toLocaleDateString("he-IL")}] | מחיר:$${s.price} | שינוי:${s.changeP > 0 ? "+" : ""}${(s.changeP||0).toFixed(2)}% | RSI:${s.rsi} | SMA20:$${s.sma20} | SMA50:$${s.sma50} | ריצפה:$${s.floor} | תיקרה:$${s.ceiling} | מגמה:${s.trend?.label} | נפח:${s.relVol}x`
        ).join("\n") + dataNote
      : "⚠️ נתוני שוק לא זמינים — ניתוח לפי ידע כללי בלבד";

    const portSnap = portfolio.map(p => {
      const s = allData[p.symbol];
      const pnl = s ? ((s.price - p.avgCost) * p.shares).toFixed(0) : "—";
      return `${p.symbol}: ${p.shares} מניות, כניסה $${p.avgCost}, נוכחי $${s?.price || "—"}, P&L: $${pnl}`;
    }).join("\n");

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 2000,
          system: `אתה סוכן ניתוח טכני מקצועי בעברית. השם שלך "יהונתן חיים ניתוח שוק ההון".
אם המשתמש שולח תמונה של גרף — נתח אותה לפי מה שאתה רואה: מגמה, ריצפה, תיקרה, RSI אם מופיע, נרות, נקודות תמיכה/התנגדות. תן ניתוח מקצועי מלא על הגרף בדיוק כמו שאתה מנתח מניה.
המשתמש: ${userProfile.firstName} | רמה: ${userProfile.level}

נתוני שוק אמיתיים (Yahoo Finance, 15 דק' השהייה) — השתמש בהם תמיד:
${snapshot || "טוען..."}

תיק וירטואלי של המשתמש:
${portSnap || "ריק"}

                הניתוחים מופעלים על ידי בינה מלאכותית (Claude AI) ועלולים להכיל שגיאות, אי-דיוקים, או מידע מיושן. אין להסתמך עליהם לקבלת החלטות פיננסיות.<br/><br/>

                <strong style={{color:"#fff"}}>4. ויתור על אחריות</strong><br/>
                המפתח <strong>יהונתן חיים</strong> וכל הקשורים בפיתוח האפליקציה <strong>אינם נושאים בכל אחריות</strong> לכל נזק, הפסד, או תביעה — ישירים או עקיפים — הנובעים משימוש באפליקציה זו.<br/><br/>

                <strong style={{color:"#fff"}}>5. אחריות המשתמש</strong><br/>
                כל החלטה פיננסית שיתקבל בעקבות שימוש באפליקציה הינה <strong>באחריות המשתמש הבלבד</strong>. המשתמש מצהיר כי הוא מודע לסיכונים הכרוכים בהשקעות ומסחר בניירות ערך.<br/><br/>

                <strong style={{color:"#fff"}}>6. נתוני שוק</strong><br/>
                נתוני המחירים מסופקים על ידי Yahoo Finance ומושהים ב-15 דקות לפחות. אין להשתמש בהם לפעולות מסחר בזמן אמת.
              </div>
            </div>

            {/* Watchlist Management */}
            <div style={{ background:"rgba(77,166,255,0.05)", border:"1px solid rgba(77,166,255,0.15)", borderRadius:16, padding:16, marginBottom:20 }}>
              <div style={{ color:"#4da6ff", fontSize:13, fontWeight:700, marginBottom:12 }}>📋 רשימת מעקב אישית</div>
              
              {/* Current watchlist */}
              <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginBottom:12 }}>
                {watchlist.map(sym => (
                  <div key={sym} style={{ display:"flex", alignItems:"center", gap:6, background:"rgba(77,166,255,0.1)", border:"1px solid rgba(77,166,255,0.2)", borderRadius:20, padding:"5px 12px" }}>
                    <span style={{ color:"#4da6ff", fontSize:13, fontWeight:700 }}>{sym}</span>
                    <button onClick={() => {
                      const updated = watchlist.filter(s => s !== sym);
                      setWatchlist(updated);
                      const newData = { ...stockData };
                      delete newData[sym];
                      setStockData(newData);
                    }} style={{ background:"none", border:"none", color:"#ff4d6d", cursor:"pointer", fontSize:14, padding:0, lineHeight:1 }}>✕</button>
                  </div>
                ))}
              </div>

              {/* Add symbol */}
              <div style={{ display:"flex", gap:8 }}>
                <input
                  id="watchlist-input"
                  placeholder="הוסף מניה (TSLA, AMZN...)"
                  style={{ flex:1, background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:12, padding:"9px 14px", color:"#fff", fontSize:13, outline:"none", direction:"ltr", textTransform:"uppercase" }}
                  onKeyDown={e => {
                    if (e.key === "Enter") {
                      const sym = e.target.value.trim().toUpperCase();
                      if (sym && !watchlist.includes(sym)) {
                        setWatchlist(prev => [...prev, sym]);
                        loadQuote(sym);
                      }
                      e.target.value = "";
                    }
                  }}
                />
                <button onClick={() => {
                  const input = document.getElementById("watchlist-input");
                  const sym = input.value.trim().toUpperCase();
                  if (sym && !watchlist.includes(sym)) {
                    setWatchlist(prev => [...prev, sym]);
                    loadQuote(sym);
                  }
                  input.value = "";
                }} style={{ background:"linear-gradient(135deg,#4da6ff,#0088ff)", border:"none", borderRadius:12, padding:"9px 16px", color:"#fff", fontWeight:800, fontSize:13, cursor:"pointer" }}>+הוסף</button>
              </div>
              <div style={{ fontSize:11, color:"#3a5070", marginTop:8 }}>לחץ Enter או "+הוסף" להוספת מניה</div>
            </div>

            {/* User info */}
            <div style={{ background:"rgba(0,255,170,0.05)", border:"1px solid rgba(0,255,170,0.1)", borderRadius:16, padding:14 }}>
              <div style={{ color:"#00ffaa", fontSize:12, fontWeight:700, marginBottom:8 }}>👤 פרטי משתמש</div>
              <div style={{ color:"#c8d8e8", fontSize:13 }}>{userProfile.firstName} {userProfile.lastName}</div>
              <div style={{ color:"#3a5070", fontSize:11, marginTop:2 }}>{userProfile.level} · {userProfile.portfolioSize}</div>
              {userProfile.email && <div style={{ color:"#3a5070", fontSize:11 }}>{userProfile.email}</div>}
            </div>
          </div>
        </div>
      )}
      {/* ── Feedback Modal ── */}
      {feedbackOpen && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", zIndex: 999, display: "flex", alignItems: "flex-end", justifyContent: "center" }}
          onClick={e => { if (e.target === e.currentTarget) { setFeedbackOpen(false); setFeedbackSent(false); setFeedbackText(""); } }}>
          <div style={{ width: 390, background: "#0d1528", borderRadius: "24px 24px 0 0", padding: "28px 24px 48px", border: "1px solid rgba(255,255,255,0.08)" }}>
            {!feedbackSent ? <>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
                <div>
                  <div style={{ fontSize: 18, fontWeight: 800, color: "#fff" }}>💬 חוות דעת ורעיונות</div>
                  <div style={{ fontSize: 12, color: C.sub, marginTop: 3 }}>ישלח ישירות לצוות הפיתוח</div>
                </div>
                <button onClick={() => { setFeedbackOpen(false); setFeedbackText(""); }} style={{ background: "rgba(255,255,255,0.08)", border: "none", color: "#fff", borderRadius: 50, width: 32, height: 32, cursor: "pointer", fontSize: 16 }}>✕</button>
              </div>

              {/* User info display */}
              <div style={{ background: "rgba(0,255,170,0.06)", border: "1px solid rgba(0,255,170,0.15)", borderRadius: 12, padding: "10px 14px", marginBottom: 16, display: "flex", gap: 10, alignItems: "center" }}>
                <span style={{ fontSize: 20 }}>👤</span>
                <div>
                  <div style={{ color: "#fff", fontSize: 13, fontWeight: 600 }}>{userProfile.firstName} {userProfile.lastName}</div>
                  <div style={{ color: C.sub, fontSize: 11 }}>{userProfile.email} · {userProfile.level} · {userProfile.portfolioSize}</div>
                </div>
              </div>

              <textarea
                value={feedbackText}
                onChange={e => setFeedbackText(e.target.value)}
                placeholder="מה עובד טוב? מה חסר? מה תשנה? כל רעיון מתקדם..."
                style={{ width: "100%", height: 130, background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 14, padding: "14px 16px", color: "#fff", fontSize: 14, outline: "none", direction: "rtl", resize: "none", fontFamily: "'Assistant', sans-serif", lineHeight: 1.6, marginBottom: 14 }}
              />

              <button
                onClick={() => {
                  if (!feedbackText.trim()) return;
                  // שלח למייל דרך mailto
                  const subject = encodeURIComponent(`פידבק מ-${userProfile.firstName} ${userProfile.lastName} | ${userProfile.level} | ${userProfile.portfolioSize}`);
                  const body = encodeURIComponent(`שם: ${userProfile.firstName} ${userProfile.lastName}\nאימייל: ${userProfile.email}\nרמה: ${userProfile.level}\nתיק: ${userProfile.portfolioSize}\nתחומי עניין: ${userProfile.interests?.join(", ")}\n\n--- פידבק ---\n${feedbackText}`);
                  window.open(`mailto:Ikoa2009@gmail.com?subject=${subject}&body=${body}`);
                  setFeedbackSent(true);
                }}
                style={{ width: "100%", background: feedbackText.trim() ? "linear-gradient(135deg,#f0c040,#ff8c69)" : "rgba(255,255,255,0.07)", border: "none", borderRadius: 50, padding: "14px", fontSize: 15, fontWeight: 800, color: feedbackText.trim() ? "#0a0e1a" : C.sub, cursor: feedbackText.trim() ? "pointer" : "default", transition: "all 0.2s" }}>
                שלח פידבק →
              </button>
            </> : (
              <div style={{ textAlign: "center", padding: "20px 0" }}>
                <div style={{ fontSize: 52, marginBottom: 16 }}>🙏</div>
                <div style={{ fontSize: 20, fontWeight: 800, color: "#fff", marginBottom: 8 }}>תודה רבה!</div>
                <div style={{ fontSize: 14, color: C.sub, lineHeight: 1.6 }}>הפידבק שלך ישלח ישירות למפתח.<br />כל הערה עוזרת לשפר את הסוכן.</div>
                <button onClick={() => { setFeedbackOpen(false); setFeedbackSent(false); setFeedbackText(""); }}
                  style={{ marginTop: 24, background: "rgba(255,255,255,0.08)", border: "none", borderRadius: 50, padding: "12px 32px", color: "#fff", fontSize: 14, cursor: "pointer" }}>סגור</button>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ══════════ ROOT WRAPPER ══════════
export default function App() {
  const [userProfile, setUserProfile] = useState(null);

  if (!userProfile) {
    return (
      <Onboarding onDone={(profile) => {
        setUserProfile(profile);
      }} />
    );
  }

  return <MainApp userProfile={userProfile} />;
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
